name: Keka Data Sync

on:
  schedule:
    - cron: '0 0 * * *' # Idhi prathi roju midnight auto ga run avthundi
  workflow_dispatch: # Idhi meeru manual ga run cheyadaniki help avthundi

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        run: |
  pip install pandas requests google-auth google-api-python-client google-cloud-bigquery

    - name: Run Sync Script
      env:
        KEKA_CLIENT_ID: ${{ secrets.KEKA_CLIENT_ID }}
        KEKA_CLIENT_SECRET: ${{ secrets.KEKA_CLIENT_SECRET }}
        KEKA_API_KEY: ${{ secrets.KEKA_API_KEY }}
        GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      run: python keka_sync.py
